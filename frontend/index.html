    <!-- Dark mode: restore preference before paint -->
    <script>
      (function() {
        var saved = localStorage.getItem('theme'); // 'light', 'dark', or 'auto'/null
        var meta = document.querySelector('meta[name="theme-color"]');
        var mq = window.matchMedia('(prefers-color-scheme: dark)');

        function applyTheme(mode) {
          var isDark = (mode === 'dark') || (mode === 'auto' && mq.matches);
          if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            if (meta) meta.content = '#1c2128';
          } else {
            document.documentElement.removeAttribute('data-theme');
            if (meta) meta.content = '#343a40';
          }
          document.documentElement.setAttribute('data-theme-mode', mode);
        }

        // Normalize legacy: null or missing → 'auto'
        var mode = saved || 'auto';
        if (mode !== 'light' && mode !== 'dark' && mode !== 'auto') mode = 'auto';
        applyTheme(mode);

        // Listen for system theme changes when in auto mode
        mq.addEventListener('change', function() {
          var cur = localStorage.getItem('theme') || 'auto';
          if (cur === 'auto') applyTheme('auto');
        });

        window.setThemeMode = function(mode) {
          localStorage.setItem('theme', mode);
          applyTheme(mode);
        };
        // Keep legacy compat
        window.toggleDarkMode = function() {
          var cur = localStorage.getItem('theme') || 'auto';
          var next = cur === 'dark' ? 'light' : 'dark';
          window.setThemeMode(next);
        };
      })();
    </script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').catch(function() {});
        });
        navigator.serviceWorker.addEventListener('message', function(e) {
          if (e.data && e.data.type === 'SW_UPDATED') {
            window.location.reload();
          }
        });
      }
    </script>
