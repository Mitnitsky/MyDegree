<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyDegree — מעקב תואר</title>

    <!-- Preconnect to Bootstrap CDN -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />

    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="copy-dir" href="fonts" />
    <link data-trunk rel="copy-dir" href="images" />
    <link data-trunk rel="copy-file" href="courses.json" />
    <link data-trunk rel="rust" data-wasm-opt="z" />
</head>
<body>
    <!-- Firebase config (gitignored — copy firebase_config.example.js to get started) -->
    <script data-trunk src="firebase_config.js"></script>
    <!-- Firebase v10 modular SDK (bundled by esbuild, tree-shaken) -->
    <script data-trunk src="firebase_bridge.js"></script>
    <!-- Bootstrap 5 JS (deferred — modals/dropdowns not needed at first paint) -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
