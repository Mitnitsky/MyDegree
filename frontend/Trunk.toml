[serve]
address = "0.0.0.0"
port = 8080

[build]
target = "index.html"
dist = "dist"

[watch]
ignore = ["firebase_bridge.js", "bootstrap.purged.css"]

# Bundle Firebase v10 modular SDK before Trunk processes JS assets
[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = ["-c", "npm run build --prefix ."]
